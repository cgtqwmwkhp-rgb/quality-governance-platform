# Quality Governance Platform — Service Level Objectives (SLOs)
# Version: 1.1.0
# Last updated: 2026-03-21

service: quality-governance-platform
environment: production

slos:
  # Availability
  - name: API Availability
    description: Percentage of successful (non-5xx) API responses
    target: 99.5%
    window: 30d
    measurement: |
      1 - (count of 5xx responses) / (total responses)
    alert_threshold: 99.0%

  # Latency — Read endpoints
  - name: Read API Latency (p95)
    description: 95th percentile response time for GET endpoints
    target: 500ms
    window: 7d
    endpoints:
      - GET /api/v1/audits/templates
      - GET /api/v1/audits/runs
      - GET /api/v1/incidents
      - GET /api/v1/risks
      - GET /api/v1/complaints
      - GET /api/v1/documents
      - GET /api/v1/policies
    alert_threshold: 750ms

  # Latency — Write endpoints
  - name: Write API Latency (p95)
    description: 95th percentile response time for POST/PATCH/PUT/DELETE endpoints
    target: 1000ms
    window: 7d
    alert_threshold: 1500ms

  # Error Rate
  - name: API Error Rate
    description: Percentage of responses with 4xx/5xx status (excluding 401/404)
    target: < 0.5%
    window: 7d
    excluded_codes: [401, 404]
    alert_threshold: 1.0%

  # Database Performance
  - name: Database Query Latency (p95)
    description: 95th percentile query execution time
    target: 200ms
    window: 7d
    alert_threshold: 500ms

  # Frontend Performance
  - name: Frontend LCP (Largest Contentful Paint)
    description: Time for largest content element to render
    target: 2500ms
    window: 7d
    measurement: Web Vitals LCP metric

  - name: Frontend FID (First Input Delay)
    description: Time from first user interaction to browser response
    target: 100ms
    window: 7d
    measurement: Web Vitals FID metric

  # Background Jobs
  - name: Email Delivery Latency
    description: Time from email task queued to delivered
    target: 60s
    window: 7d

  - name: Push Notification Delivery Latency
    description: Time from notification task queued to delivered
    target: 10s
    window: 7d

escalation_policy:
  - level: 1
    condition: SLO breached for > 15 minutes
    action: Alert on-call engineer via PagerDuty
  - level: 2
    condition: SLO breached for > 1 hour
    action: Escalate to engineering lead
  - level: 3
    condition: SLO breached for > 4 hours
    action: Escalate to CTO and initiate incident response

# -----------------------------------------------------------------------------
# D04 — Performance SLOs (detailed narrative: docs/slo/performance-slos.md)
# -----------------------------------------------------------------------------
performance:
  doc: docs/slo/performance-slos.md
  opentelemetry_metrics:
    - name: api.response_time_ms
      description: HTTP request duration for API routes; use for p50/p95/p99 CRUD SLOs
    - name: db.query_time_ms
      description: Database query duration; tag indexed vs complex join paths where possible

  api_latency_crud:
    description: Standard CRUD endpoints under normal load
    targets_ms:
      p50: 100
      p95: 200
      p99: 500
    alert_thresholds_ms:
      p95: 200
      p99: 500
      p50_warning: 100

  database_queries:
    indexed:
      percentile: p95
      target_ms: 50
      alert_threshold_ms: 50
    complex_joins:
      percentile: p99
      target_ms: 200
      alert_threshold_ms: 200

  frontend_budget:
    references:
      - frontend/lighthouserc.json
    targets:
      fcp_ms: 1500
      lcp_ms: 2500
      tbt_ms: 200
      cls: 0.1

  bundle_size:
    references:
      - frontend/.size-limit.json
    targets_gzip_kb:
      main_js: 300
      total_initial_js: 500

  backend_throughput:
    requests_per_second_per_instance: 100
    p99_latency_ms_while_at_load: 500

  load_tests:
    reference: tests/performance/locustfile.py
    pass_fail:
      p95_response_ms_max: 500
      error_rate_pct_max: 1.0
      throughput_rps_min: 100
      p99_latency_ms_max_at_target_load: 500

  review_cadence:
    weekly: p99 review (API, DB, key frontend vitals)
    monthly: trend analysis (percentiles, bundles, Lighthouse, load baselines)
