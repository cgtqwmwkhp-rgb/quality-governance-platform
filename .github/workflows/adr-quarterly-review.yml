name: ADR Quarterly Review Reminder

on:
  schedule:
    # First Monday of each quarter at 08:00 UTC
    # Jan, Apr, Jul, Oct — first Monday approximated with day-of-month 1–7
    - cron: '0 8 1-7 1,4,7,10 1'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run — create issue draft but do not post'
        required: false
        default: 'false'
        type: choice
        options: ['true', 'false']

jobs:
  open-review-issue:
    name: Open ADR Quarterly Review Issue
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run ADR lifecycle check
        id: lifecycle
        run: |
          python3 scripts/check_adr_lifecycle.py > /tmp/adr-lifecycle.txt 2>&1 || true
          echo "lifecycle_output<<EOF" >> "$GITHUB_OUTPUT"
          cat /tmp/adr-lifecycle.txt >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Count ADRs
        id: counts
        run: |
          total=$(ls docs/adr/ADR-*.md 2>/dev/null | wc -l | tr -d ' ')
          accepted=$(grep -rl "Status.*Accepted\|Accepted" docs/adr/ADR-*.md 2>/dev/null | wc -l | tr -d ' ')
          proposed=$(grep -rl "Status.*Proposed\|Proposed" docs/adr/ADR-*.md 2>/dev/null | wc -l | tr -d ' ')
          echo "total=$total" >> "$GITHUB_OUTPUT"
          echo "accepted=$accepted" >> "$GITHUB_OUTPUT"
          echo "proposed=$proposed" >> "$GITHUB_OUTPUT"

      - name: Create quarterly review issue
        if: inputs.dry_run != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          QUARTER: ${{ fromJSON('["Q1","Q2","Q3","Q4"]')[github.event.schedule && 3 || 0] }}
        run: |
          YEAR=$(date +%Y)
          MONTH=$(date +%-m)
          if   [ "$MONTH" -le 3 ];  then QUARTER="Q1"
          elif [ "$MONTH" -le 6 ];  then QUARTER="Q2"
          elif [ "$MONTH" -le 9 ];  then QUARTER="Q3"
          else                           QUARTER="Q4"
          fi

          TITLE="ADR Quarterly Review — ${QUARTER} ${YEAR}"
          BODY="## ADR Quarterly Review — ${QUARTER} ${YEAR}

This issue is auto-generated by the \`.github/workflows/adr-quarterly-review.yml\` workflow to ensure Architecture Decision Records are reviewed, updated, and kept current.

### Current ADR Inventory
- **Total ADRs:** ${{ steps.counts.outputs.total }}
- **Accepted:** ${{ steps.counts.outputs.accepted }}
- **Proposed (pending decision):** ${{ steps.counts.outputs.proposed }}

### Review Checklist

- [ ] Read all ADRs in \`docs/adr/\` — flag any that are stale, superseded, or need updating
- [ ] Identify any **Proposed** ADRs older than 90 days — make a decision or deprecate
- [ ] Check for architectural decisions made in the past quarter that are not yet documented
- [ ] Verify all ADRs reference current file paths and component names
- [ ] Update \`**Date**\` and \`**Status**\` fields on any reviewed ADRs
- [ ] Close this issue when all ADRs are reviewed and any new ones are written

### Lifecycle Check Output

\`\`\`
${{ steps.lifecycle.outputs.lifecycle_output }}
\`\`\`

### ADR Guidelines

- New ADRs: copy the template from \`docs/governance/decision-log-template.md\`
- Naming: \`ADR-NNNN-short-title.md\` in \`docs/adr/\`
- Status values: Proposed | Accepted | Deprecated | Superseded
- Assign a reviewer before closing as Accepted

/cc @platform-team"

          gh issue create \
            --repo "$GITHUB_REPOSITORY" \
            --title "$TITLE" \
            --body "$BODY" \
            --label "governance,adr,quarterly-review" \
            || echo "Note: Labels may not exist — issue created without labels"

      - name: Dry run output
        if: inputs.dry_run == 'true'
        run: |
          echo "=== DRY RUN — Would create issue ==="
          echo "ADR count: ${{ steps.counts.outputs.total }}"
          echo "Accepted: ${{ steps.counts.outputs.accepted }}"
          echo "Proposed: ${{ steps.counts.outputs.proposed }}"
          echo "Lifecycle check output:"
          cat /tmp/adr-lifecycle.txt
