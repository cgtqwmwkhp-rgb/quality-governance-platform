  mutation-testing:
    name: Mutation Testing (mutmut, weekly)
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
          pip install "mutmut<3"

      - name: Run mutmut on critical modules
        run: |
          echo "=== Mutation Testing (weekly, advisory) ==="
          mutmut run \
            --paths-to-mutate=src/domain/services/ \
            --tests-dir=tests/unit/ \
            --runner="python -m pytest tests/unit/ -x -q" \
            --no-progress || true

      - name: Generate mutmut report
        run: |
          mutmut results > mutmut-results.txt 2>&1 || true
          mutmut html 2>/dev/null || true
          echo "=== Mutation Score Summary ==="
          cat mutmut-results.txt | tail -20 || true

      - name: Upload mutation report
        uses: actions/upload-artifact@v4
        with:
          name: mutation-testing-report
          path: |
            mutmut-results.txt
            html/
          retention-days: 30
        if: always()

  compliance-freshness:
    name: Compliance Doc Freshness
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check for placeholder dates
        run: |
          echo "=== Compliance Doc Freshness Check ==="
          STALE_FOUND=0

          for file in \
            docs/compliance/compliance-matrix-iso.md \
            docs/security/security-policy.md \
            docs/ops/runtime-config-inventory.md \
            docs/privacy/data-retention-policy.md \
            docs/privacy/dpia-template.md; do
            if [ -f "$file" ]; then
              if grep -q '_\[YYYY-MM-DD\]_' "$file"; then
                echo "[FAIL] Placeholder date found in $file"
                grep -n '_\[YYYY-MM-DD\]_' "$file"
                STALE_FOUND=1
              fi
            fi
          done

          if [ "$STALE_FOUND" = "1" ]; then
            echo ""
            echo "[FAIL] Placeholder dates found in compliance docs"
            exit 1
          fi

          echo "[OK] All compliance docs have real dates"

  radon-complexity:
    name: Cyclomatic Complexity Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install radon
        run: pip install radon

      - name: Check cyclomatic complexity
        run: |
          echo "=== Cyclomatic Complexity Check ==="
          OUTPUT=$(radon cc src/ -a -nc --total-average 2>&1)
          echo "$OUTPUT"
          if echo "$OUTPUT" | grep -qE "Average complexity: [C-F]"; then
            echo "[FAIL] Average complexity is C or worse"
            exit 1
          fi
          echo "[OK] Average complexity is B or better"

