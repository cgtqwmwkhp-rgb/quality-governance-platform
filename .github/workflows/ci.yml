          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
          pip install locust

      - name: Run migrations
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:testpass@localhost:5432/quality_governance_test
        run: alembic upgrade head

      - name: Seed Locust user accounts
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:testpass@localhost:5432/quality_governance_test
        run: PYTHONPATH="${{ github.workspace }}" python scripts/seed_ci_locust_users.py

      - name: Start app and wait for healthy
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:testpass@localhost:5432/quality_governance_test
          REDIS_URL: redis://localhost:6379/0
          SECRET_KEY: test-secret-key-minimum16chars
          JWT_SECRET_KEY: test-jwt-secret-min16chars
          TESTING: "1"
          APP_ENV: development
        run: |
          uvicorn src.main:app --host 127.0.0.1 --port 8000 &
          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:8000/healthz > /dev/null 2>&1; then
              echo "[OK] App is healthy after ${i}s"
              break
            fi
            sleep 2
          done
          curl -sf http://127.0.0.1:8000/healthz || { echo "[FAIL] App did not become healthy"; exit 1; }

      - name: Run Locust headless
        env:
          # GitHub-hosted runners are noisy for p95; keep strict thresholds for local runs.
          LOCUST_P95_MS: "10000"
          LOCUST_ERROR_RATE_PCT: "3"
        run: |
          locust -f tests/performance/locustfile.py \
            --host http://127.0.0.1:8000 \
            --users 20 --spawn-rate 5 \
            --run-time 60s --headless \
            --exit-code-on-error 0 \
            --csv=locust-results \
            --only-summary

      - name: Upload Locust results
        uses: actions/upload-artifact@v4
        with:
          name: locust-load-test
          path: locust-results*.csv
          retention-days: 30
        if: always()

