name: Update Requirements Lockfile

on:
  push:
    branches: [main]
    paths: ['requirements.txt', 'scripts/generate_lockfile.sh']
  schedule:
    - cron: '0 6 * * 1'  # Weekly Monday 6am UTC (LOCKFILE_UPGRADE=1 below: refresh pins within constraints)
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update-lockfile:
    name: Generate requirements.lock
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Generate lockfile
        env:
          # Prefer fresh resolves within requirements.txt bounds so unpinned transitive drift
          # (e.g. uvicorn patch bumps) does not leave main red until the next manual fix.
          LOCKFILE_UPGRADE: '1'
        run: |
          chmod +x ./scripts/generate_lockfile.sh
          ./scripts/generate_lockfile.sh

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: 'chore: update requirements.lock'
          title: 'chore: update requirements.lock'
          body: |
            Auto-generated lockfile update from `requirements.txt`.
            
            Generated with `pip-compile` on Python 3.11 with `--generate-hashes`.
          branch: auto/lockfile-update
          labels: dependencies,python
          delete-branch: true
