name: Update Requirements Lockfile

on:
  push:
    branches: [main]
    paths: ['requirements.txt']
  schedule:
    - cron: '0 6 * * 1'  # Weekly Monday 6am UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update-lockfile:
    name: Generate requirements.lock
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install pip-tools
        run: python -m pip install --upgrade pip pip-tools

      - name: Generate lockfile
        run: |
          pip-compile requirements.txt \
            -o requirements.lock \
            --no-header \
            --strip-extras \
            --allow-unsafe \
            --generate-hashes \
            --quiet
          echo "[OK] requirements.lock generated with hashes"

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: 'chore: update requirements.lock'
          title: 'chore: update requirements.lock'
          body: |
            Auto-generated lockfile update from `requirements.txt`.
            
            Generated with `pip-compile` on Python 3.11 with `--generate-hashes`.
          branch: auto/lockfile-update
          labels: dependencies,python
          delete-branch: true
