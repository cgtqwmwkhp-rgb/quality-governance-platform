# Quarantine Policy Configuration
# ================================
# This file defines quarantined tests with strict governance.
# CI enforces: expiry dates, issue IDs, and prevents quarantine growth.
#
# Zero active quarantines — all former GOVPLAT-001/002 suites are exercised in CI.

version: "1.0"
last_updated: "2026-04-05"

# Global settings
settings:
  max_quarantine_days: 30
  enforce_expiry: true
  block_on_expiry: true

# Quarantine entries (empty — add only with issue ID, owner, and expiry ≤30 days)
quarantines: []

# Metrics tracking
metrics:
  baseline_quarantine_count: 0
  max_allowed_quarantine_count: 0
  last_audit_date: "2026-04-05"

# Active test suites (must pass)
active_suites:
  - tests/unit/
  - tests/integration/
  - tests/smoke/test_enterprise_smoke.py
  - tests/smoke/test_phase3_phase4_smoke.py
  - tests/e2e/
